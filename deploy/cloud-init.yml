#cloud-config

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - htop
  - jq
  - fail2ban
  - ufw

# Create service user
users:
  - default
  - name: aicombinator
    shell: /bin/bash
    groups: [docker]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

write_files:
  # Docker daemon config
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "5"
        }
      }

runcmd:
  # ─── Install Docker ────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable --now docker

  # ─── Install Node.js 22 ────────────────────────────────
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y -qq nodejs

  # ─── Install cloudflared ───────────────────────────────
  - curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-$(dpkg --print-architecture).deb" -o /tmp/cloudflared.deb
  - dpkg -i /tmp/cloudflared.deb
  - rm /tmp/cloudflared.deb

  # ─── Create directory structure ────────────────────────
  - mkdir -p /srv/aicombinator/{supervisor,companies,mcp-servers/{email,browser,finance,domain,social},logs}
  - chown -R aicombinator:aicombinator /srv/aicombinator

  # ─── Create Docker network ────────────────────────────
  - docker network create aicombinator || true

  # ─── Firewall ─────────────────────────────────────────
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw --force enable

  # ─── Signal ready ─────────────────────────────────────
  - echo "CLOUD_INIT_COMPLETE" > /srv/aicombinator/.ready
  - chown aicombinator:aicombinator /srv/aicombinator/.ready
